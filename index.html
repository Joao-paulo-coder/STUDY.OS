<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #080a0f; }
  ::selection { background: rgba(74,159,255,0.3); }

  input:-webkit-autofill,
  input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
    -webkit-text-fill-color: #fff !important;
    transition: background-color 5000s ease-in-out 0s;
  }

  .page {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; padding: 20px;
    font-family: 'DM Mono', monospace;
  }

  /* ── FUNDO ── */
  .bg {
    position: absolute; inset: 0; overflow: hidden;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(74,159,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.06) 0%, transparent 50%),
      #080a0f;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(74,159,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,159,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-glow {
    position: absolute; top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(74,159,255,0.06) 0%, transparent 70%);
    animation: glowPulse 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  }

  /* ── PARTÍCULAS ── */
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    pointer-events: none;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-110vh) translateX(var(--dx)); opacity: 0; }
  }

  /* ── CONTEÚDO ── */
  .content {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── LOGO ── */
  .logo-wrap { text-align: center; margin-bottom: 36px; }
  .logo-img {
    width: 72px; height: 72px; border-radius: 20px;
    margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto;
    animation: iconGlow 3s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(74,159,255,0.2);
  }
  @keyframes iconGlow {
    0%, 100% { box-shadow: 0 0 40px rgba(74,159,255,0.15); }
    50% { box-shadow: 0 0 60px rgba(74,159,255,0.35); }
  }
  .logo-title {
    font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #logo-img {
    animation: iconGlow 3s ease-in-out infinite;
  }
  .logo-sub {
    margin-top: 6px; font-size: 11px; letter-spacing: 3px;
    color: rgba(255,255,255,0.25); text-transform: uppercase;
  }

  /* ── FEATURE BADGE ── */
  .feature-wrap { text-align: center; margin-bottom: 28px; height: 32px; }
  .feature-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px; padding: 6px 16px;
    font-size: 12px; color: rgba(255,255,255,0.5);
    animation: fadeBadge 0.4s ease both;
  }
  @keyframes fadeBadge {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── CARD ── */
  .card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px; padding: 36px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: transform 0.1s ease;
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 28px;
    background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px;
  }
  .tab {
    flex: 1; padding: 10px; border: none; border-radius: 9px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
    background: transparent; color: rgba(255,255,255,0.3);
  }
  .tab.active {
    background: rgba(74,159,255,0.15); color: #4a9fff;
  }
  .tab:active { transform: scale(0.97); }

  /* ── INPUTS FLOATING LABEL ── */
  .input-group { position: relative; margin-bottom: 18px; }
  .input-box {
    display: flex; align-items: center; gap: 12;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 0 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus-within {
    border-color: rgba(74,159,255,0.6);
    box-shadow: 0 0 0 3px rgba(74,159,255,0.1);
  }
  .input-box.has-error { border-color: rgba(239,68,68,0.6); }
  .input-icon {
    font-size: 16px; opacity: 0.35; transition: opacity 0.2s; flex-shrink: 0;
  }
  .input-box:focus-within .input-icon { opacity: 1; }
  .input-inner { flex: 1; position: relative; height: 56px; }
  .input-label {
    position: absolute; left: 0; top: 18px; pointer-events: none;
    font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.3);
    transition: all 0.2s ease;
  }
  .input-inner:focus-within .input-label,
  .input-inner.has-value .input-label {
    top: 8px; font-size: 10px;
  }
  .input-inner:focus-within .input-label { color: #4a9fff; }
  .input-inner input {
    position: absolute; bottom: 8px; left: 0; right: 0; width: 100%;
    background: transparent; border: none; outline: none;
    color: #fff; font-size: 15px; font-family: 'DM Mono', monospace;
  }
  .input-error {
    margin: 5px 0 0 16px; font-size: 11px; color: #ef4444;
    font-family: 'DM Mono', monospace;
    animation: fadeInUp 0.2s ease both;
  }

  /* ── FORGOT LINK ── */
  .forgot-btn {
    background: none; border: none; color: rgba(255,255,255,0.3);
    font-size: 11px; cursor: pointer; font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px; margin-bottom: 18px; padding: 0;
    text-decoration: underline; text-decoration-color: rgba(255,255,255,0.1);
    transition: color 0.2s; display: block;
  }
  .forgot-btn:hover { color: rgba(255,255,255,0.6); }

  /* ── BOTÃO PRIMÁRIO ── */
  .btn-primary {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #4a9fff, #6366f1);
    color: #fff; font-size: 15px; font-weight: 700;
    font-family: 'Syne', sans-serif; letter-spacing: 0.5px;
    cursor: pointer; position: relative; overflow: hidden;
    box-shadow: 0 4px 24px rgba(74,159,255,0.3);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(74,159,255,0.4); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-primary::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .btn-primary:hover::after { opacity: 1; }

  .spinner {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SUCESSO ── */
  .success-msg {
    background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
    font-size: 12px; color: #34d399; font-family: 'DM Mono', monospace;
    animation: fadeInUp 0.3s ease both;
  }

  /* ── ERRO GERAL ── */
  .error-msg {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
    font-size: 12px; color: #ef4444; font-family: 'DM Mono', monospace;
    animation: fadeInUp 0.3s ease both;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 12; margin: 24px 0;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
  .divider-text {
    font-size: 11px; color: rgba(255,255,255,0.2);
    font-family: 'DM Mono', monospace; letter-spacing: 2px;
  }

  /* ── FEATURES FOOTER ── */
  .features-footer {
    display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
  }
  .feature-item {
    font-size: 10px; color: rgba(255,255,255,0.15);
    font-family: 'DM Mono', monospace; transition: color 0.2s;
    cursor: default;
  }
  .feature-item:hover { color: rgba(255,255,255,0.5); }

  /* ── RODAPÉ ── */
  .page-footer {
    text-align: center; margin-top: 24px;
    font-size: 10px; color: rgba(255,255,255,0.12); letter-spacing: 1px;
    animation: fadeInUp 0.8s 0.8s ease both; opacity: 0;
    animation-fill-mode: both;
  }

  /* ── VOLTAR BTN ── */
  .back-btn {
    width: 100%; margin-top: 12px; background: none; border: none;
    color: rgba(255,255,255,0.3); font-size: 12px; cursor: pointer;
    font-family: 'DM Mono', monospace; transition: color 0.2s;
  }
  .back-btn:hover { color: rgba(255,255,255,0.6); }

  /* ── FORM TRANSITION ── */
  .form-section {
    animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* ── PARALLAX CARD ── */
  .card-tilt {
    transform-style: preserve-3d;
    transition: transform 0.15s ease;
  }
</style>

<script>
// ── Features rotativo ──
const features = [
  { icon: "⏱", label: "Timer Pomodoro" },
  { icon: "◧", label: "Anotações" },
  { icon: "◻", label: "Tarefas" },
  { icon: "◉", label: "Relatórios" },
  { icon: "◎", label: "Professor IA" },
  { icon: "◫", label: "Rotina Semanal" },
  { icon: "◈", label: "Flowtime" },
  { icon: "▣", label: "Timeboxing" },
];
let fi = 0;
setInterval(() => {
  fi = (fi + 1) % features.length;
  const badge = document.getElementById('feature-badge');
  badge.style.animation = 'none';
  badge.offsetHeight;
  document.getElementById('feature-icon').textContent = features[fi].icon;
  document.getElementById('feature-label').textContent = features[fi].label;
  badge.style.animation = 'fadeBadge 0.4s ease both';
}, 2500);

// ── Partículas ──
const colors = ['#4a9fff', '#a78bfa', '#34d399', '#f472b6'];
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    const x = Math.random() * 100;
    const duration = Math.random() * 20 + 15;
    const delay = Math.random() * 15;
    const dx = (Math.random() - 0.5) * 120;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const opacity = Math.random() * 0.4 + 0.1;
    p.style.cssText = `
      left:${x}%; bottom:-10px;
      width:${size}px; height:${size}px;
      background:${color}; opacity:${opacity};
      --dx:${dx}px;
      animation-duration:${duration}s;
      animation-delay:${delay}s;
    `;
    container.appendChild(p);
  }
}

// ── Parallax card ──
const cardTilt = document.getElementById('card-tilt');
document.addEventListener('mousemove', (e) => {
  const rect = cardTilt.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / rect.width;
  const dy = (e.clientY - cy) / rect.height;
  cardTilt.style.transform = `perspective(1000px) rotateY(${dx * 5}deg) rotateX(${-dy * 5}deg)`;
});
document.addEventListener('mouseleave', () => {
  cardTilt.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
});

// ── Estado ──
let mode = 'login';
let loading = false;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (m === 'login') document.getElementById('tab-login').classList.add('active');
  if (m === 'register') document.getElementById('tab-register').classList.add('active');
  renderForm();
}

// ── Render form ──
function renderForm() {
  const c = document.getElementById('form-container');
  c.innerHTML = '';

  const section = document.createElement('div');
  section.className = 'form-section';

  let html = '';

  if (mode === 'register') {
    html += inputHTML('name', 'Nome completo', 'text', '◈');
  }
  html += inputHTML('email', 'Email', 'email', '◎');
  if (mode !== 'forgot') {
    html += inputHTML('password', 'Senha', 'password', '◆');
  }
  if (mode === 'login') {
    html += `<button class="forgot-btn" onclick="setMode('forgot')">Esqueci minha senha</button>`;
  }

  html += `<div id="msg-container"></div>`;

  const labels = {
    login: 'Entrar no StudyOS →',
    register: 'Criar minha conta →',
    forgot: 'Enviar link de recuperação →',
  };
  html += `<button class="btn-primary" id="submit-btn" onclick="handleSubmit()">
    <span id="btn-text">${labels[mode]}</span>
  </button>`;

  if (mode === 'forgot') {
    html += `<button class="back-btn" onclick="setMode('login')">← Voltar ao login</button>`;
  }

  // Divider + features
  html += `
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">BETA 1.0</span>
      <div class="divider-line"></div>
    </div>
    <div class="features-footer">
      ${features.map(f => `<span class="feature-item">${f.icon} ${f.label}</span>`).join('')}
    </div>
  `;

  section.innerHTML = html;
  c.appendChild(section);
}

function inputHTML(id, label, type, icon) {
  return `
    <div class="input-group">
      <div class="input-box" id="box-${id}">
        <span class="input-icon">${icon}</span>
        <div class="input-inner" id="inner-${id}">
          <label class="input-label" for="inp-${id}">${label}</label>
          <input type="${type}" id="inp-${id}"
            oninput="checkValue('${id}')"
            onfocus="checkValue('${id}')"
            onblur="checkValue('${id}')"
          />
        </div>
      </div>
      <div id="err-${id}"></div>
    </div>
  `;
}

function checkValue(id) {
  const inp = document.getElementById('inp-' + id);
  const inner = document.getElementById('inner-' + id);
  if (inp && inner) {
    if (inp.value.length > 0) inner.classList.add('has-value');
    else inner.classList.remove('has-value');
  }
}

function showMsg(html, type = 'success') {
  const c = document.getElementById('msg-container');
  if (!c) return;
  c.innerHTML = `<div class="${type}-msg">${html}</div>`;
}

function clearMsg() {
  const c = document.getElementById('msg-container');
  if (c) c.innerHTML = '';
}

function setFieldError(id, msg) {
  const el = document.getElementById('err-' + id);
  const box = document.getElementById('box-' + id);
  if (el) el.innerHTML = msg ? `<div class="input-error">${msg}</div>` : '';
  if (box) {
    if (msg) box.classList.add('has-error');
    else box.classList.remove('has-error');
  }
}

function validate() {
  let ok = true;
  const email = document.getElementById('inp-email')?.value || '';
  const password = document.getElementById('inp-password')?.value || '';
  const name = document.getElementById('inp-name')?.value || '';

  if (mode === 'register') {
    if (!name) { setFieldError('name', 'Nome obrigatório'); ok = false; }
    else setFieldError('name', '');
  }

  if (!email) { setFieldError('email', 'Email obrigatório'); ok = false; }
  else if (!/\S+@\S+\.\S+/.test(email)) { setFieldError('email', 'Email inválido'); ok = false; }
  else setFieldError('email', '');

  if (mode !== 'forgot') {
    if (!password) { setFieldError('password', 'Senha obrigatória'); ok = false; }
    else if (password.length < 6) { setFieldError('password', 'Mínimo 6 caracteres'); ok = false; }
    else setFieldError('password', '');
  }

  return ok;
}

// =====================================================================
// handleSubmit — Processa login, cadastro e recuperação de senha.
// Chamado pelo botão principal do formulário.
// =====================================================================
async function handleSubmit() {
  clearMsg();
  // Valida campos antes de qualquer requisição
  if (!validate()) return;

  // Bloqueia o botão para evitar cliques duplos
  const btn = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  btn.disabled = true;
  btnText.innerHTML = `<div class="spinner"></div> Aguarde...`;

  const email    = document.getElementById('inp-email')?.value    || '';
  const password = document.getElementById('inp-password')?.value || '';
  const name     = document.getElementById('inp-name')?.value     || '';

  try {

    // ── LOGIN ──────────────────────────────────────────────────────
    if (mode === 'login') {
      // Autentica com email + senha via Supabase Auth
      const { data: authData, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;

      // Após login bem-sucedido, busca o role do usuário na tabela `profiles`
      // (criada pela migração de hierarquia: super_admin > educador > aluno)
      try {
        const { data: profile } = await sb
          .from('profiles')
          .select('role, nome')
          .eq('id', authData.user.id)
          .single();

        // Salva role + nome no sessionStorage para acesso rápido no app.
        // sessionStorage é limpo automaticamente ao fechar o browser,
        // sendo mais seguro que localStorage para dados de sessão.
        if (profile) {
          sessionStorage.setItem('studyos_user', JSON.stringify({
            id:   authData.user.id,
            role: profile.role || 'aluno',
            nome: profile.nome || email.split('@')[0],
          }));
        }
      } catch (profileErr) {
        // Não impede o login caso o perfil ainda não exista
        // (ex: email recém-confirmado, trigger ainda não executou)
        console.warn('[login] Perfil não encontrado ainda:', profileErr.message);
      }

      showMsg('Bem-vindo de volta! 🎉 Redirecionando...', 'success');
      setTimeout(() => window.location.href = 'studyos.html', 1000);

    // ── CADASTRO ───────────────────────────────────────────────────
    } else if (mode === 'register') {
      // Cria conta no Supabase Auth.
      // O trigger `handle_new_user` criará automaticamente o registro
      // na tabela `profiles` com role = 'aluno' (padrão).
      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { nome: name } } // nome salvo no metadata do usuário
      });
      if (error) throw error;
      showMsg('Conta criada! Verifique seu email para confirmar. 🎉', 'success');

    // ── RECUPERAÇÃO DE SENHA ───────────────────────────────────────
    } else if (mode === 'forgot') {
      // Envia email com link de redefinição de senha
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/studyos.html'
      });
      if (error) throw error;
      showMsg(`Link enviado para <strong>${email}</strong>. Verifique sua caixa de entrada.`, 'success');
    }

  } catch (err) {
    // Mapeia erros técnicos do Supabase para mensagens amigáveis em PT-BR
    const msgs = {
      'Invalid login credentials':              'Email ou senha incorretos.',
      'Email not confirmed':                    'Confirme seu email antes de entrar.',
      'User already registered':                'Este email já está cadastrado.',
      'Password should be at least 6 characters': 'Senha muito curta.',
    };
    showMsg(msgs[err.message] || err.message, 'error');
  }

  btn.disabled = false;
  const labels = { login: 'Entrar no StudyOS →', register: 'Criar minha conta →', forgot: 'Enviar link de recuperação →' };
  btnText.textContent = labels[mode];
}

// ── Init ──
renderForm();
