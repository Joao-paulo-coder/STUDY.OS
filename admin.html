<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS — Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #080a0f; color: #e8edf8; font-family: 'DM Mono', monospace; overflow: hidden; }

/* === VARIÁVEIS === */
:root {
  --bg:#080a0f; --surface:#0d0f0e; --card:#131613; --border:#1e2220;
  --accent:#4a9fff; --accent2:#a78bfa; --green:#34d399; --yellow:#fbbf24;
  --red:#f07c7c; --text:#e8edf8; --muted:#4a5568;
}

/* === LAYOUT 3 COLUNAS === */
.layout { display:grid; grid-template-rows:52px 1fr; grid-template-columns:260px 1fr; height:100vh; }

/* === HEADER === */
.header {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); z-index:10;
}
.header-left  { display:flex; align-items:center; gap:16px; }
.header-right { display:flex; align-items:center; gap:10px; }
.logo { font-family:'Syne',sans-serif; font-size:16px; font-weight:800;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,0.5));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* Pill de role no header */
.role-pill { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:3px 10px; border-radius:100px; font-weight:600; }
.pill-super_admin { background:rgba(251,191,36,0.15); color:#fbbf24; border:1px solid rgba(251,191,36,0.3); }
.pill-educador    { background:rgba(74,159,255,0.15);  color:#4a9fff; border:1px solid rgba(74,159,255,0.3); }
.pill-aluno       { background:rgba(52,211,153,0.10);  color:#34d399; border:1px solid rgba(52,211,153,0.2); }

.btn-header {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.6); padding:6px 14px; border-radius:8px;
  font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; transition:all 0.2s;
}
.btn-header:hover { background:rgba(255,255,255,0.08); color:#fff; }
.btn-danger { border-color:rgba(239,68,68,0.2); color:#ef4444; }
.btn-danger:hover { background:rgba(239,68,68,0.1); }

/* === SIDEBAR === */
.sidebar { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:14px 16px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sidebar-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:10px; }
.search-box { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:7px 12px; color:var(--text); font-size:12px; font-family:'DM Mono',monospace; outline:none; transition:border-color 0.2s; }
.search-box:focus { border-color:rgba(74,159,255,0.4); }
.search-box::placeholder { color:var(--muted); }
.filter-row { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; }
.filter-btn { font-size:10px; padding:3px 9px; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.15s; font-family:'DM Mono',monospace; }
.filter-btn.active { background:rgba(74,159,255,0.12); color:var(--accent); border-color:rgba(74,159,255,0.3); }
.users-count { padding:6px 16px; font-size:10px; color:var(--muted); letter-spacing:1px; border-bottom:1px solid var(--border); flex-shrink:0; }
.users-list { flex:1; overflow-y:auto; }
.users-list::-webkit-scrollbar { width:4px; }
.users-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.user-item { display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; transition:background 0.15s; border-bottom:1px solid rgba(255,255,255,0.03); }
.user-item:hover { background:rgba(255,255,255,0.03); }
.user-item.active { background:rgba(74,159,255,0.08); border-left:2px solid var(--accent); padding-left:14px; }
.user-avatar { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; font-family:'Syne',sans-serif; flex-shrink:0; }
.avatar-super_admin { background:rgba(251,191,36,0.15); color:#fbbf24; }
.avatar-educador    { background:rgba(74,159,255,0.15);  color:#4a9fff; }
.avatar-aluno       { background:rgba(52,211,153,0.10);  color:#34d399; }
.user-item-info { flex:1; min-width:0; }
.user-item-nome  { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-item-email { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.role-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.dot-super_admin { background:#fbbf24; }
.dot-educador    { background:#4a9fff; }
.dot-aluno       { background:#34d399; }
.users-empty { text-align:center; padding:40px 16px; color:var(--muted); font-size:12px; }

/* === ÁREA PRINCIPAL === */
.main { display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
.welcome-screen { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(--muted); }
.welcome-screen .icon-big { font-size:48px; opacity:0.3; }

/* Cabeçalho do usuário selecionado */
.user-header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.015); flex-shrink:0; }
.user-header-info { display:flex; align-items:center; gap:12px; }
.user-header-avatar { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; font-family:'Syne',sans-serif; }
.user-header-nome  { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
.user-header-email { font-size:11px; color:var(--muted); margin-top:2px; }

/* Badges de role */
.role-badge { display:inline-flex; align-items:center; padding:4px 12px; border-radius:100px; font-size:10px; letter-spacing:1px; text-transform:uppercase; font-weight:600; }
.badge-super_admin { background:rgba(251,191,36,0.15); color:#fbbf24; border:1px solid rgba(251,191,36,0.3); }
.badge-educador    { background:rgba(74,159,255,0.15);  color:#4a9fff; border:1px solid rgba(74,159,255,0.3); }
.badge-aluno       { background:rgba(52,211,153,0.10);  color:#34d399; border:1px solid rgba(52,211,153,0.2); }

/* Abas */
.tabs-bar { display:flex; gap:2px; padding:0 24px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.01); flex-shrink:0; overflow-x:auto; }
.tabs-bar::-webkit-scrollbar { height:0; }
.tab-btn { padding:12px 16px; border:none; background:transparent; color:var(--muted); font-size:12px; font-family:'DM Mono',monospace; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; }
.tab-btn:hover { color:rgba(255,255,255,0.7); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* Conteúdo da aba */
.tab-content { flex:1; overflow-y:auto; padding:24px; }
.tab-content::-webkit-scrollbar { width:4px; }
.tab-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* === COMPONENTES === */
.metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
.metric-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
.metric-label { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
.metric-value { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; }
.metric-sub   { font-size:10px; color:var(--muted); margin-top:4px; }
.section { margin-bottom:28px; }
.section-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:12px; }
.data-table { width:100%; border-collapse:collapse; }
.data-table thead { background:rgba(255,255,255,0.02); }
.data-table th { text-align:left; padding:10px 14px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); font-weight:500; }
.data-table td { padding:10px 14px; font-size:12px; border-top:1px solid rgba(255,255,255,0.03); }
.data-table tr:hover td { background:rgba(255,255,255,0.015); }
.table-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.item-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:8px; }
.item-card-title { font-size:13px; font-weight:600; margin-bottom:4px; }
.item-card-sub   { font-size:11px; color:var(--muted); }
.progress-bar-wrap { background:rgba(255,255,255,0.05); border-radius:100px; height:6px; margin-top:6px; }
.progress-bar { height:100%; border-radius:100px; background:var(--accent); transition:width 0.5s ease; }
.tag { display:inline-block; padding:2px 8px; border-radius:100px; font-size:10px; font-weight:600; letter-spacing:0.5px; }
.tag-done    { background:rgba(52,211,153,0.15);  color:#34d399; }
.tag-pending { background:rgba(251,191,36,0.12);  color:#fbbf24; }
.tag-late    { background:rgba(240,124,124,0.12); color:#f07c7c; }
.materia-chip { display:inline-block; font-size:10px; padding:2px 8px; border-radius:6px; background:rgba(255,255,255,0.06); color:var(--muted); }
.role-select { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:5px 12px; border-radius:8px; font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; outline:none; }
.empty-state { text-align:center; padding:48px 24px; color:var(--muted); font-size:12px; }
.empty-state .empty-icon { font-size:32px; opacity:0.3; margin-bottom:10px; }
.spinner-wrap { text-align:center; padding:48px; color:var(--muted); font-size:12px; }

/* Grade de rotina */
.rotina-grid { display:grid; grid-template-columns:50px repeat(7,1fr); gap:2px; font-size:10px; }
.rotina-header { text-align:center; padding:6px 2px; color:var(--muted); font-weight:600; letter-spacing:1px; }
.rotina-hora   { color:var(--muted); padding:4px 6px; text-align:right; line-height:24px; }
.rotina-slot   { min-height:24px; border-radius:4px; background:rgba(255,255,255,0.02); border:1px solid transparent; padding:3px 5px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.rotina-slot.filled { background:rgba(74,159,255,0.12); border-color:rgba(74,159,255,0.2); color:var(--text); }

/* Gráfico de barras */
.bar-chart { display:flex; align-items:flex-end; gap:6px; height:80px; margin-top:8px; }
.bar-col   { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.bar       { width:100%; border-radius:4px 4px 0 0; background:var(--accent); opacity:0.7; min-height:2px; transition:height 0.5s ease; }
.bar-label { font-size:9px; color:var(--muted); }

/* Toast */
#toast { position:fixed; bottom:24px; right:24px; z-index:9999; padding:12px 20px; border-radius:12px; font-size:12px; display:none; animation:slideUp 0.3s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }


/* =====================================================
   RESPONSIVIDADE MOBILE
   ===================================================== */

/* Botão hamburguer — só aparece em mobile */
.btn-menu {
  display:none; background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.7);
  width:36px; height:36px; border-radius:8px; cursor:pointer;
  font-size:16px; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.2s;
}
.btn-menu:hover { background:rgba(255,255,255,0.08); color:#fff; }

/* Botão voltar na área principal — só aparece em mobile */
.btn-back-sidebar {
  display:none; align-items:center; gap:6px; background:transparent;
  border:none; color:var(--accent); font-family:'DM Mono',monospace;
  font-size:12px; cursor:pointer; padding:10px 16px;
  border-bottom:1px solid var(--border); width:100%; text-align:left;
}

/* Overlay escuro ao abrir sidebar no mobile */
#sidebar-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
  z-index:49; backdrop-filter:blur(2px);
}
#sidebar-overlay.visible { display:block; }

@media (max-width: 768px) {
  /* Layout vira coluna única */
  .layout {
    grid-template-columns: 1fr \!important;
    grid-template-rows: 52px 1fr \!important;
  }

  /* Header compacto */
  .header { padding:0 12px; gap:8px; }
  .header-badge-text { display:none; }
  .btn-header { padding:6px 10px; font-size:10px; }

  /* Esconde o texto "Voltar ao app" no mobile, mantém só o ← */
  .btn-voltar-text { display:none; }

  /* Hamburguer visível */
  .btn-menu { display:flex; }

  /* Sidebar vira drawer deslizante */
  .sidebar {
    position:fixed; top:52px; left:0; bottom:0;
    width:280px; z-index:50;
    transform:translateX(-100%);
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow:4px 0 24px rgba(0,0,0,0.4);
  }
  .sidebar.open { transform:translateX(0); }

  /* Área principal ocupa tudo */
  .main { grid-column:1 / -1; }

  /* Botão voltar aparece quando painel está aberto */
  .btn-back-sidebar { display:flex; }

  /* User header mais compacto */
  .user-header { padding:12px 16px; flex-wrap:wrap; gap:8px; }
  .user-header-nome { font-size:14px; }
  .user-header-email { font-size:10px; }

  /* Tabs com scroll horizontal */
  .tabs-bar { padding:0 12px; }
  .tab-btn { padding:10px 12px; font-size:11px; }

  /* Conteúdo com padding menor */
  .tab-content { padding:16px; }

  /* Métricas em 2 colunas */
  .metrics-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  .metric-value { font-size:20px; }

  /* Tabelas com scroll horizontal */
  .table-wrap { overflow-x:auto; }

  /* Item cards mais compactos */
  .item-card { padding:12px 14px; }

  /* Rotina: scroll horizontal */
  .rotina-grid { min-width:520px; }

  /* Toast no centro do mobile */
  #toast { left:16px; right:16px; text-align:center; }
}

/* Tela de acesso negado */
.access-denied { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; padding:40px; text-align:center; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="roles.js"></script>
</head>
<body>

<!-- ================================================================
     HTML — ESTRUTURA DA PÁGINA
     ================================================================ -->

<!-- Layout principal (oculto até verificação de permissão) -->
<div class="layout" id="layout" style="display:none">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="btn-menu" onclick="toggleSidebar()" title="Menu" id="btn-menu">☰</button>
      <span class="logo">StudyOS</span>
      <span class="role-pill" id="header-role-pill">…</span>
      <span style="font-size:11px;color:var(--muted);letter-spacing:1px" id="header-panel-label" class="header-badge-text"></span>
    </div>
    <div class="header-right">
      <button class="btn-header" onclick="window.location.href='studyos.html'">← <span class="btn-voltar-text">Voltar ao app</span></button>
      <button class="btn-header btn-danger" onclick="logout()">Sair</button>
    </div>
  </header>

  <!-- SIDEBAR — lista de usuários com busca e filtros -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title" id="sidebar-title">Usuários</div>
      <input class="search-box" type="text" id="search-input"
        placeholder="Buscar por nome ou email…" oninput="filtrarUsuarios()" />
      <!-- Filtros de role: preenchidos dinamicamente conforme quem está logado -->
      <div class="filter-row" id="filter-row"></div>
    </div>
    <div class="users-count" id="users-count">Carregando…</div>
    <div class="users-list" id="users-list">
      <div class="spinner-wrap">Carregando usuários…</div>
    </div>
  </aside>

  <!-- ÁREA PRINCIPAL -->
  <main class="main" id="main-area">

    <!-- Tela de boas-vindas: exibida até o usuário selecionar alguém -->
    <button class="btn-back-sidebar" id="btn-back-sidebar" onclick="closeSidebar(); closeSidebar();" style="display:none">
      ← Ver lista de usuários
    </button>
    <div class="welcome-screen" id="welcome-screen">
      <div class="icon-big">◎</div>
      <p>Selecione um usuário na lista para ver os dados</p>
    </div>

    <!-- Painel do usuário selecionado (oculto inicialmente) -->
    <div id="user-panel" style="display:none;flex-direction:column;height:100%">

      <!-- Cabeçalho com avatar, nome, email e role do usuário selecionado -->
      <div class="user-header">
        <div class="user-header-info">
          <div class="user-header-avatar" id="panel-avatar"></div>
          <div>
            <div class="user-header-nome" id="panel-nome">—</div>
            <div class="user-header-email" id="panel-email">—</div>
          </div>
          <span class="role-badge" id="panel-role-badge"></span>
        </div>
        <div style="font-size:11px;color:var(--muted);text-align:right">
          <div>Cadastrado em</div>
          <div id="panel-created" style="color:var(--text)">—</div>
        </div>
      </div>

      <!-- Barra de abas: gerada em JS conforme role do logado -->
      <div class="tabs-bar" id="tabs-bar"></div>

      <!-- Conteúdo dinâmico da aba ativa -->
      <div class="tab-content" id="tab-content">
        <div class="spinner-wrap">Carregando…</div>
      </div>
    </div>
  </main>
</div>

<!-- Tela de acesso negado (aluno tenta abrir a URL diretamente) -->
<div class="access-denied" id="access-denied" style="display:none">
  <div style="font-size:40px">🔒</div>
  <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700">Acesso não autorizado</div>
  <div style="font-size:12px;color:var(--muted)">Esta área é exclusiva para Educadores e Super Admins.</div>
  <button onclick="window.location.href='studyos.html'" style="margin-top:20px;padding:12px 24px;border-radius:12px;background:linear-gradient(135deg,#4a9fff,#6366f1);border:none;color:#fff;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;font-size:14px;">← Voltar ao app</button>
</div>

<!-- Loading inicial enquanto verifica permissões -->
<div id="loading-screen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#080a0f;flex-direction:column;gap:12px;color:#4a5568;font-size:12px;">
  <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff">StudyOS</div>
  <div>Verificando permissões…</div>
</div>

<!-- Toast de notificação -->
<div id="toast"></div>

<script>
// ===================================================================
// ESTADO GLOBAL
// ===================================================================
let currentProfile = null; // perfil do usuário LOGADO (quem está usando o painel)
let allUsers       = [];   // lista completa de usuários carregados do Supabase
let filteredUsers  = [];   // lista após aplicar busca e filtro de role
let selectedUser   = null; // usuário selecionado na sidebar
let filterRole     = 'all';// filtro de role ativo: 'all'|'aluno'|'educador'|'super_admin'

// sb já declarado em roles.js (mesmo escopo global) — não redeclarar
// const sb = window._sb; <- REMOVIDO para evitar SyntaxError de redeclaração

// Cores das matérias (mesma ordem do studyos.html)
const CORES = ['#34d399','#7cc8f0','#fb923c','#f87171','#a78bfa','#4a9fff'];

// ===================================================================
// INICIALIZAÇÃO — roda ao carregar a página
// Verifica sessão Supabase, carrega perfil e monta a interface
// ===================================================================
(async () => {
  try {
    // Segurança: garante que roles.js criou o cliente Supabase
    if (!window._sb) throw new Error('Supabase nao inicializado — roles.js falhou ao carregar.');

    // 1. Verifica se há sessão ativa
    const { data: { session }, error: sessErr } = await sb.auth.getSession();
    if (sessErr) throw sessErr;
    if (!session) { window.location.href = 'index.html'; return; }

    // 2. Busca o perfil com role do usuário logado
    currentProfile = await StudyRoles.getUserProfile();
    if (!currentProfile) { window.location.href = 'index.html'; return; }

    // 3. Bloqueia acesso a usuários sem permissão (alunos)
    if ((StudyRoles.ROLE_LEVEL[currentProfile.role] ?? 0) < 2) {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('access-denied').style.display  = 'flex';
      return;
    }

    // 4. Configura header com role do logado
    const pill = document.getElementById('header-role-pill');
    pill.textContent = currentProfile.role === 'super_admin' ? '★ Super Admin' : '◈ Educador';
    pill.className   = `role-pill pill-${currentProfile.role}`;
    document.getElementById('header-panel-label').textContent =
      currentProfile.role === 'super_admin' ? 'Painel Super Admin' : 'Painel Educador';

    // 5. Monta filtros na sidebar conforme role
    montarFiltros();

    // 6. Carrega lista de usuários do Supabase
    await carregarUsuarios();

    // 7. Exibe o layout
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('layout').style.display = 'grid';

  } catch (err) {
    // Qualquer erro inesperado: mostra mensagem em vez de travar infinitamente
    console.error('[admin] Erro na inicializacao:', err);
    const ls = document.getElementById('loading-screen');
    ls.innerHTML = `
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff">StudyOS</div>
      <div style="color:#f07c7c;margin-top:4px">Erro: ${err.message}</div>
      <button onclick="location.reload()" style="margin-top:16px;padding:10px 22px;border-radius:10px;background:rgba(74,159,255,0.15);border:1px solid rgba(74,159,255,0.3);color:#4a9fff;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;">Tentar novamente</button>
      <button onclick="window.location.href='index.html'" style="margin-top:8px;padding:10px 22px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;">Voltar ao login</button>`;
  }
})();

// ===================================================================
// montarFiltros
// Super admin: filtros para todos os roles
// Educador: sem filtros (vê apenas alunos, fixado via query)
// ===================================================================
function montarFiltros() {
  const row = document.getElementById('filter-row');
  if (currentProfile.role === 'super_admin') {
    row.innerHTML = `
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('aluno',this)">Alunos</button>
      <button class="filter-btn" onclick="setFilter('educador',this)">Educadores</button>
      <button class="filter-btn" onclick="setFilter('super_admin',this)">Admins</button>`;
    document.getElementById('sidebar-title').textContent = 'Todos os Usuários';
  } else {
    // Educador: sidebar mostra apenas alunos, sem opção de filtro
    filterRole = 'aluno';
    document.getElementById('sidebar-title').textContent = 'Alunos';
  }
}

// ===================================================================
// setFilter — troca o filtro de role e re-renderiza a lista
// ===================================================================
function setFilter(role, btn) {
  filterRole = role;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtrarUsuarios();
}

// ===================================================================
// carregarUsuarios — busca usuários do Supabase conforme role logado
// Educador → somente alunos | Super admin → todos
// ===================================================================
async function carregarUsuarios() {
  let query = sb.from('profiles').select('id,nome,email,role,created_at').order('nome');
  if (currentProfile.role === 'educador') query = query.eq('role','aluno');

  const { data, error } = await query;
  if (error) { showToast('Erro ao carregar: ' + error.message, 'error'); return; }

  allUsers = data || [];
  filtrarUsuarios();
}

// ===================================================================
// filtrarUsuarios — aplica busca por texto e filtro de role no cliente
// ===================================================================
function filtrarUsuarios() {
  const termo = (document.getElementById('search-input').value || '').toLowerCase();
  filteredUsers = allUsers.filter(u => {
    const passaRole  = filterRole === 'all' || u.role === filterRole;
    const passaTexto = !termo ||
      (u.nome  || '').toLowerCase().includes(termo) ||
      (u.email || '').toLowerCase().includes(termo);
    return passaRole && passaTexto;
  });
  renderUsuarios();
}

// ===================================================================
// renderUsuarios — desenha a lista de usuários na sidebar
// ===================================================================
function renderUsuarios() {
  const list  = document.getElementById('users-list');
  const count = document.getElementById('users-count');
  count.textContent = `${filteredUsers.length} usuário(s)`;

  if (!filteredUsers.length) {
    list.innerHTML = '<div class="users-empty">Nenhum usuário encontrado</div>';
    return;
  }
  list.innerHTML = filteredUsers.map(u => {
    const ini = (u.nome || u.email || '?').charAt(0).toUpperCase();
    return `
      <div class="user-item ${selectedUser?.id===u.id?'active':''}" onclick="selecionarUsuario('${u.id}')">
        <div class="user-avatar avatar-${u.role}">${ini}</div>
        <div class="user-item-info">
          <div class="user-item-nome">${u.nome || '(sem nome)'}</div>
          <div class="user-item-email">${u.email || '—'}</div>
        </div>
        <div class="role-dot dot-${u.role}" title="${u.role}"></div>
      </div>`;
  }).join('');
}

// ===================================================================
// selecionarUsuario — exibe o painel de dados do usuário clicado
// ===================================================================
async function selecionarUsuario(userId) {
  selectedUser = allUsers.find(u => u.id === userId);
  if (!selectedUser) return;

  renderUsuarios(); // atualiza estado .active na lista

  // Oculta tela de boas-vindas, exibe painel
  document.getElementById('welcome-screen').style.display = 'none';
  const panel = document.getElementById('user-panel');
  panel.style.display       = 'flex';
  panel.style.flexDirection = 'column';
  panel.style.height        = '100%';

  // Preenche cabeçalho do painel com dados do usuário selecionado
  const ini = (selectedUser.nome || selectedUser.email || '?').charAt(0).toUpperCase();
  const av  = document.getElementById('panel-avatar');
  av.textContent = ini;
  av.className   = `user-header-avatar avatar-${selectedUser.role}`;

  document.getElementById('panel-nome').textContent    = selectedUser.nome  || '(sem nome)';
  document.getElementById('panel-email').textContent   = selectedUser.email || '—';
  document.getElementById('panel-created').textContent = new Date(selectedUser.created_at).toLocaleDateString('pt-BR');

  const badge = document.getElementById('panel-role-badge');
  badge.textContent = selectedUser.role.replace('_',' ');
  badge.className   = `role-badge badge-${selectedUser.role}`;

  // Gera as abas e carrega a primeira
  montarAbas();
}

// ===================================================================
// montarAbas — define as abas disponíveis conforme role do logado
// Educador: Visão Geral, Tarefas, Anotações, Progresso, Rotina
// Super Admin: as mesmas + aba Gestão (exclusiva)
// ===================================================================
function montarAbas() {
  const abas = [
    { id:'visao-geral', label:'⬡ Visão Geral' },
    { id:'tarefas',     label:'◻ Tarefas'      },
    { id:'notas',       label:'◧ Anotações'    },
    { id:'progresso',   label:'◉ Progresso'    },
    { id:'rotina',      label:'◫ Rotina'        },
  ];
  // Aba exclusiva do super_admin para gerenciar roles e ver metadados
  if (currentProfile.role === 'super_admin') {
    abas.push({ id:'gestao', label:'★ Gestão' });
  }

  document.getElementById('tabs-bar').innerHTML = abas.map(a =>
    `<button class="tab-btn ${a.id==='visao-geral'?'active':''}"
             id="tab-btn-${a.id}" onclick="mudarAba('${a.id}')">${a.label}</button>`
  ).join('');

  mudarAba('visao-geral');
}

// ===================================================================
// mudarAba — troca a aba ativa e renderiza o conteúdo correspondente
// ===================================================================
async function mudarAba(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`tab-btn-${tabId}`);
  if (btn) btn.classList.add('active');

  document.getElementById('tab-content').innerHTML = '<div class="spinner-wrap">Carregando…</div>';

  // Rota para a função de renderização de cada aba
  const rotas = {
    'visao-geral': renderVisaoGeral,
    'tarefas':     renderTarefas,
    'notas':       renderNotas,
    'progresso':   renderProgresso,
    'rotina':      renderRotina,
    'gestao':      renderGestao,
  };
  if (rotas[tabId]) await rotas[tabId]();
}

// ===================================================================
// ABA: VISÃO GERAL
// Métricas rápidas: tarefas, horas estudadas, anotações, matérias
// ===================================================================
async function renderVisaoGeral() {
  const uid = selectedUser.id;
  // Busca múltiplas tabelas em paralelo para performance
  const [rTar, rNot, rPom, rMat] = await Promise.all([
    sb.from('tarefas').select('id,done,data').eq('user_id', uid),
    sb.from('notas').select('id').eq('user_id', uid),
    sb.from('pomodoro_log').select('mins,data,materia').eq('user_id', uid),
    sb.from('materias').select('id,nome,cor').eq('user_id', uid),
  ]);
  const tarefas  = rTar.data || [];
  const notas    = rNot.data || [];
  const pomLogs  = rPom.data || [];
  const materias = rMat.data || [];

  const feitas     = tarefas.filter(t => t.done).length;
  const atrasadas  = tarefas.filter(t => !t.done && t.data && t.data < hojeStr()).length;
  const totalMins  = pomLogs.reduce((s,p) => s + (p.mins||0), 0);
  const horas      = Math.floor(totalMins/60);
  const diasUnicos = new Set(pomLogs.map(p => p.data)).size;

  // Distribuição por matéria (top 5)
  const minsMat = {};
  pomLogs.forEach(p => { if(p.materia) minsMat[p.materia] = (minsMat[p.materia]||0) + p.mins; });
  const topMat = Object.entries(minsMat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const matMap = Object.fromEntries(materias.map(m=>[m.id,m]));

  document.getElementById('tab-content').innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Tarefas feitas</div>
        <div class="metric-value" style="color:var(--green)">${feitas}</div>
        <div class="metric-sub">de ${tarefas.length} total</div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${tarefas.length?Math.round(feitas/tarefas.length*100):0}%"></div></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Atrasadas</div>
        <div class="metric-value" style="color:${atrasadas>0?'var(--red)':'var(--muted)'}">${atrasadas}</div>
        <div class="metric-sub">pendentes e vencidas</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Horas estudadas</div>
        <div class="metric-value" style="color:var(--accent)">${horas}h${totalMins%60?totalMins%60+'m':''}</div>
        <div class="metric-sub">em sessões Pomodoro</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Dias com estudo</div>
        <div class="metric-value" style="color:var(--yellow)">${diasUnicos}</div>
        <div class="metric-sub">dias com sessões</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Anotações</div>
        <div class="metric-value">${notas.length}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Matérias</div>
        <div class="metric-value">${materias.length}</div>
      </div>
    </div>
    ${topMat.length ? `
    <div class="section">
      <div class="section-title">Tempo por matéria</div>
      <div class="table-wrap"><table class="data-table">
        <thead><tr><th>Matéria</th><th>Minutos</th><th>Proporção</th></tr></thead>
        <tbody>${topMat.map(([id,mins])=>{
          const m = matMap[id]; const max = topMat[0][1];
          return `<tr>
            <td>${m?.nome||'—'}</td><td>${mins} min</td>
            <td><div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.round(mins/max*100)}%"></div></div></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>` : ''}
    ${materias.length ? `
    <div class="section">
      <div class="section-title">Matérias cadastradas</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${materias.map(m=>`<span class="materia-chip" style="border-left:3px solid ${CORES[m.cor]||'var(--accent)'};padding-left:8px">${m.nome}</span>`).join('')}
      </div>
    </div>` : ''}`;
}

// ===================================================================
// ABA: TAREFAS
// Lista agrupada por status: atrasadas > pendentes > feitas
// ===================================================================
async function renderTarefas() {
  const uid = selectedUser.id;
  const [rTar, rMat] = await Promise.all([
    sb.from('tarefas').select('*').eq('user_id',uid).order('data'),
    sb.from('materias').select('id,nome').eq('user_id',uid),
  ]);
  const tarefas = rTar.data || [];
  const matMap  = Object.fromEntries((rMat.data||[]).map(m=>[m.id,m.nome]));
  const hoje    = hojeStr();

  if (!tarefas.length) {
    document.getElementById('tab-content').innerHTML =
      `<div class="empty-state"><div class="empty-icon">◻</div><p>Nenhuma tarefa cadastrada</p></div>`;
    return;
  }

  const grupo = (lista, titulo, cls, lbl) => !lista.length ? '' : `
    <div class="section">
      <div class="section-title">${titulo} (${lista.length})</div>
      <div class="table-wrap"><table class="data-table">
        <thead><tr><th>Descrição</th><th>Matéria</th><th>Data</th><th>Status</th></tr></thead>
        <tbody>${lista.map(t=>`<tr>
          <td style="${t.done?'opacity:.5;text-decoration:line-through':''}">${t.descricao||t.desc||'—'}</td>
          <td><span class="materia-chip">${matMap[t.materia]||'—'}</span></td>
          <td style="color:var(--muted)">${t.data?formatarData(t.data):'—'}</td>
          <td><span class="tag ${cls}">${lbl}</span></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;

  document.getElementById('tab-content').innerHTML =
    grupo(tarefas.filter(t=>!t.done&&t.data&&t.data<hoje), 'Atrasadas',  'tag-late',    'Atrasada') +
    grupo(tarefas.filter(t=>!t.done&&(!t.data||t.data>=hoje)), 'Pendentes','tag-pending','Pendente') +
    grupo(tarefas.filter(t=>t.done),                          'Concluídas','tag-done',   'Feita');
}

// ===================================================================
// ABA: PROGRESSO
// Gráfico semanal + histórico de sessões Pomodoro
// ===================================================================
async function renderProgresso() {
  const uid = selectedUser.id;
  const [rPom, rMat] = await Promise.all([
    sb.from('pomodoro_log').select('*').eq('user_id',uid).order('data',{ascending:false}),
    sb.from('materias').select('id,nome').eq('user_id',uid),
  ]);
  const logs   = rPom.data || [];
  const matMap = Object.fromEntries((rMat.data||[]).map(m=>[m.id,m.nome]));

  if (!logs.length) {
    document.getElementById('tab-content').innerHTML =
      `<div class="empty-state"><div class="empty-icon">◉</div><p>Nenhuma sessão de estudo registrada</p></div>`;
    return;
  }

  // Últimos 7 dias para o gráfico de barras
  const ultimos7 = [];
  for (let i=6;i>=0;i--) { const d=new Date(); d.setDate(d.getDate()-i); ultimos7.push(d.toISOString().split('T')[0]); }
  const minsDia = {}; ultimos7.forEach(d=>{ minsDia[d]=0; });
  logs.forEach(l => { if(minsDia[l.data]!==undefined) minsDia[l.data]+=(l.mins||0); });
  const maxMin  = Math.max(...Object.values(minsDia),1);
  const totalM  = logs.reduce((s,l)=>s+(l.mins||0),0);
  const diasEst = new Set(logs.map(l=>l.data)).size;

  document.getElementById('tab-content').innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Total estudado</div>
        <div class="metric-value" style="color:var(--accent)">${Math.floor(totalM/60)}h ${totalM%60}m</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Sessões</div>
        <div class="metric-value">${logs.length}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Dias com estudo</div>
        <div class="metric-value" style="color:var(--yellow)">${diasEst}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Média por dia</div>
        <div class="metric-value">${diasEst?Math.round(totalM/diasEst):0}<span style="font-size:14px"> min</span></div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Últimos 7 dias (min/dia)</div>
      <div class="bar-chart">
        ${ultimos7.map(d=>{
          const m   = minsDia[d];
          const pct = Math.round(m/maxMin*100);
          const lbl = new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short'});
          return `<div class="bar-col">
            <div style="font-size:9px;color:var(--muted)">${m>0?m+'m':''}</div>
            <div class="bar" style="height:${Math.max(pct,2)}%"></div>
            <div class="bar-label">${lbl}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-title">Histórico recente (últimas 20 sessões)</div>
      <div class="table-wrap"><table class="data-table">
        <thead><tr><th>Data</th><th>Matéria</th><th>Duração</th></tr></thead>
        <tbody>${logs.slice(0,20).map(l=>`<tr>
          <td>${formatarData(l.data)}</td>
          <td><span class="materia-chip">${matMap[l.materia]||'—'}</span></td>
          <td style="color:var(--accent)">${l.mins||0} min</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

// ===================================================================
// ABA: ROTINA
// Grade semanal de slots preenchidos pelo usuário
// ===================================================================
async function renderRotina() {
  const uid = selectedUser.id;
  const [rRot, rMat] = await Promise.all([
    sb.from('rotina').select('*').eq('user_id',uid),
    sb.from('materias').select('id,nome').eq('user_id',uid),
  ]);
  const slotMap = {};
  (rRot.data||[]).forEach(r=>{ slotMap[r.slot_key]=r; });
  const matMap = Object.fromEntries((rMat.data||[]).map(m=>[m.id,m.nome]));

  const DIAS       = ['seg','ter','qua','qui','sex','sab','dom'];
  const DIAS_LABEL = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

  // Gera horas de 07:00 a 22:45 em intervalos de 15 min
  const horas = [];
  for (let h=7;h<=22;h++) for (let m=0;m<60;m+=15)
    horas.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);

  const ocupados = Object.keys(slotMap).length;
  const total    = DIAS.length * horas.length;

  document.getElementById('tab-content').innerHTML = `
    <div class="section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title" style="margin-bottom:0">Grade Semanal</div>
        <div style="font-size:11px;color:var(--muted)">${ocupados} de ${total} slots preenchidos (${Math.round(ocupados/total*100)}%)</div>
      </div>
      <div style="overflow-x:auto">
        <div class="rotina-grid" style="min-width:500px">
          <div></div>${DIAS_LABEL.map(d=>`<div class="rotina-header">${d}</div>`).join('')}
          ${horas.map(hora=>`
            <div class="rotina-hora">${hora}</div>
            ${DIAS.map(dia=>{
              const key=`${dia}-${hora}`; const s=slotMap[key];
              const nm=s?(matMap[s.materia]||s.materia||'●'):'';
              return `<div class="rotina-slot ${s?'filled':''}" title="${nm}">${nm.substring(0,5)}</div>`;
            }).join('')}`).join('')}
        </div>
      </div>
    </div>`;
}

          <select class="role-select" id="select-novo-role">
            <option value="aluno"       ${u.role==='aluno'?'selected':''}>Aluno</option>
            <option value="educador"    ${u.role==='educador'?'selected':''}>Educador</option>
            <option value="super_admin" ${u.role==='super_admin'?'selected':''}>Super Admin</option>
          </select>
          <button onclick="salvarRole()" style="padding:6px 18px;background:rgba(74,159,255,0.15);border:1px solid rgba(74,159,255,0.3);color:var(--accent);border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;">
            Salvar alteração
          </button>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Volume de dados</div>
      <div id="gestao-stats"><div class="spinner-wrap">Carregando…</div></div>
    </div>`;

  // Carrega contagens de cada tabela do usuário
  const [rTar,rNot,rPom,rMat] = await Promise.all([
    sb.from('tarefas').select('id',{count:'exact',head:true}).eq('user_id',u.id),
    sb.from('notas').select('id',{count:'exact',head:true}).eq('user_id',u.id),
    sb.from('pomodoro_log').select('id',{count:'exact',head:true}).eq('user_id',u.id),
    sb.from('materias').select('id',{count:'exact',head:true}).eq('user_id',u.id),
  ]);
  document.getElementById('gestao-stats').innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Tarefas</div><div class="metric-value">${rTar.count??0}</div></div>
      <div class="metric-card"><div class="metric-label">Anotações</div><div class="metric-value">${rNot.count??0}</div></div>
      <div class="metric-card"><div class="metric-label">Sessões Pomodoro</div><div class="metric-value">${rPom.count??0}</div></div>
      <div class="metric-card"><div class="metric-label">Matérias</div><div class="metric-value">${rMat.count??0}</div></div>
    </div>`;
}

// ===================================================================
// salvarRole — persiste a nova role no Supabase e atualiza UI local
// ===================================================================
async function salvarRole() {
  const novoRole = document.getElementById('select-novo-role')?.value;
  if (!novoRole) return;

  const { error } = await sb.from('profiles').update({ role: novoRole }).eq('id', selectedUser.id);
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }

  // Atualiza objeto local sem recarregar tudo
  selectedUser.role = novoRole;
  const idx = allUsers.findIndex(u=>u.id===selectedUser.id);
  if (idx!==-1) allUsers[idx].role = novoRole;

  // Atualiza badge no cabeçalho do painel
  const badge = document.getElementById('panel-role-badge');
  badge.textContent = novoRole.replace('_',' ');
  badge.className   = `role-badge badge-${novoRole}`;

  filtrarUsuarios();
  showToast(`Role atualizado para "${novoRole.replace('_',' ')}"!`);
}

// ===================================================================
// UTILITÁRIOS
// ===================================================================

// Retorna data de hoje no formato YYYY-MM-DD (igual ao studyos.html)
function hojeStr() { return new Date().toISOString().split('T')[0]; }

// Converte YYYY-MM-DD para DD/MM/YYYY
function formatarData(d) {
  if (!d) return '—';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}

// Limpa sessão e redireciona para o login
async function logout() {
  sessionStorage.removeItem('studyos_user');
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// Exibe toast de notificação por 3,5 segundos
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display    = 'block';
  t.style.background = type==='error' ? 'rgba(239,68,68,0.15)'  : 'rgba(52,211,153,0.15)';
  t.style.color      = type==='error' ? '#ef4444'                : '#34d399';
  t.style.border     = type==='error' ? '1px solid rgba(239,68,68,0.3)' : '1px solid rgba(52,211,153,0.3)';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.display='none'; }, 3500);
}
// ===================================================================
// MOBILE — Toggle da sidebar como drawer
// ===================================================================
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  if (sidebar.classList.contains('open')) {
    closeSidebar();
  } else {
    sidebar.classList.add('open');
    overlay.classList.add('visible');
    document.body.style.overflow = 'hidden';
  }
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
  document.body.style.overflow = '';
}

// Fecha sidebar ao selecionar usuário no mobile
const _selecionarUsuarioOrig = selecionarUsuario;
// Sobrescreve para fechar sidebar no mobile após seleção
async function selecionarUsuario(userId) {
  await _selecionarUsuarioOrig(userId);
  // Em mobile: fecha sidebar e mostra botão voltar
  if (window.innerWidth <= 768) {
    closeSidebar();
    document.getElementById('btn-back-sidebar').style.display = 'flex';
  }
}

// Fecha sidebar ao redimensionar para desktop
window.addEventListener('resize', () => {
  if (window.innerWidth > 768) {
    closeSidebar();
    document.getElementById('btn-back-sidebar').style.display = 'none';
  }
});

</script>
